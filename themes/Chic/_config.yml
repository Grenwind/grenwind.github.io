# Header
navname: Grenwind's Blog

# navigatior items
nav:
  文章: /archives
  笔记: /category
  词条: /tag
  关于: /about

# favicon
favicon: /favicon.ico

# Profile
nickname: Grenwind

### this variable is MarkDown form.
description: When lights go out,bad things tend to happen.
avatar: /image/u=2966999711,1616223153&fm=253&fmt=auto&app=138&f=JPEG.webp

# main menu navigation
## links key words should not be changed.
## Complete url after key words.
## Unused key can be commented out.
links:
  Blog: /archives
  # Category:
  # Tags: 
  # Link:
  # Resume:
